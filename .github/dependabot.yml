version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: daily, time: '09:10', timezone: Europe/Istanbul }
    groups:
      github-actions: { patterns: ['*'] }
    open-pull-requests-limit: 5
  - package-ecosystem: composer
    directory: /
    schedule: { interval: daily, time: '09:30', timezone: Europe/Istanbul }
    groups:
      composer-dependencies: { patterns: ['*'] }
    open-pull-requests-limit: 5

